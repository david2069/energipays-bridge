services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ../energipays-client:/energipays-client   # local editable install
    environment:
      - ENERGIPAYS_EMAIL=${ENERGIPAYS_EMAIL}
      - ENERGIPAYS_PASSWORD=${ENERGIPAYS_PASSWORD}
      - ENERGIPAYS_POLL_INTERVAL=${ENERGIPAYS_POLL_INTERVAL:-60}
      - DATA_DIR=/app/data
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # MQTT — same broker as franklinwh-modbus-bridge (fwhbridge-mosquitto, host port 1886)
      - MQTT_ENABLED=true
      - MQTT_HOST=host.docker.internal
      - MQTT_PORT=1886
      - MQTT_USERNAME=
      - MQTT_PASSWORD=
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
