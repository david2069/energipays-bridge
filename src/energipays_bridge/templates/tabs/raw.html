<!-- Raw Metrics tab -->
<div x-show="$store.app.activeTab === 'raw'" x-data="rawTab()">

  <h2 class="font-semibold text-slate-800 dark:text-slate-100 mb-4">Raw Metrics</h2>

  <!-- Command selector + description -->
  <div class="card p-3 space-y-3 mb-3">

    <!-- Row 1: dropdown → Run → method badge → endpoint -->
    <div class="flex flex-wrap items-center gap-2">
      <select x-model="selectedCmd" @change="onCmdChange()"
              class="bg-slate-800 border border-slate-700 text-slate-300 text-xs rounded px-2 py-1.5 focus:outline-none focus:border-slate-500 flex-1 min-w-40">
        <optgroup label="── Read ──">
          <template x-for="c in commands.filter(c => !c.danger)" :key="c.id">
            <option :value="c.id" x-text="c.label"></option>
          </template>
        </optgroup>
        <optgroup label="── Write (modifies device) ──">
          <template x-for="c in commands.filter(c => c.danger)" :key="c.id">
            <option :value="c.id" x-text="c.label"></option>
          </template>
        </optgroup>
      </select>

      <!-- Run button — fixed position right after dropdown -->
      <button @click="runCommand()" :disabled="cmdLoading"
              :class="currentCmd.danger ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'"
              class="shrink-0 px-3 py-1.5 rounded text-xs text-white disabled:opacity-50 transition-colors font-medium">
        <span x-show="!cmdLoading">▶ Run</span>
        <span x-show="cmdLoading">…</span>
      </button>

      <!-- Method badge -->
      <span class="text-[10px] font-mono font-semibold px-1.5 py-0.5 rounded"
            :class="currentCmd.danger ? 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400' : 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400'"
            x-text="currentCmd.method || 'GET'"></span>

      <!-- Endpoint -->
      <code class="text-xs text-slate-500 font-mono truncate flex-1 min-w-0" x-text="selectedEndpoint"></code>
    </div>

    <!-- Description -->
    <p class="text-xs text-slate-500 italic" x-text="currentCmd.desc"></p>

    <!-- Param inputs -->
    <template x-if="currentCmd.params && currentCmd.params.filter(p => p.type !== 'hidden').length">
      <div class="flex flex-wrap gap-3 pt-1 border-t border-slate-700/50">
        <template x-for="p in currentCmd.params.filter(p => p.type !== 'hidden')" :key="p.key">
          <div class="flex flex-col gap-1 min-w-[120px]">
            <label class="text-[10px] text-slate-500 font-medium" x-text="p.label + (p.required ? ' *' : '')"></label>
            <template x-if="p.type === 'select'">
              <select x-model="paramValues[p.key]"
                      class="bg-slate-800 border border-slate-700 text-slate-300 text-xs rounded px-2 py-1 focus:outline-none focus:border-slate-500">
                <template x-if="!p.required"><option value="">(default)</option></template>
                <template x-for="(opt, i) in p.options" :key="opt">
                  <option :value="opt" x-text="p.optionLabels ? p.optionLabels[i] : opt"></option>
                </template>
              </select>
            </template>
            <template x-if="p.type === 'date'">
              <input type="date" x-model="paramValues[p.key]"
                     class="bg-slate-800 border border-slate-700 text-slate-300 text-xs rounded px-2 py-1 focus:outline-none focus:border-slate-500" />
            </template>
            <template x-if="p.type === 'text'">
              <input type="text" x-model="paramValues[p.key]" :placeholder="p.placeholder || ''"
                     class="bg-slate-800 border border-slate-700 text-slate-300 text-xs rounded px-2 py-1 focus:outline-none focus:border-slate-500 w-40" />
            </template>
          </div>
        </template>
      </div>
    </template>

    <!-- Danger warning -->
    <template x-if="currentCmd.danger">
      <div class="flex items-center gap-2 text-xs text-red-400 bg-red-900/20 border border-red-800/40 rounded px-3 py-2">
        <span>⚠</span>
        <span>This command modifies the device — it calls the same live endpoint as the UI and is blocked when READ_ONLY is set.</span>
      </div>
    </template>

  </div>

  <!-- Output -->
  <div class="card p-0 overflow-hidden">
    <div x-show="cmdOutput !== null" class="flex items-center justify-between px-3 pt-2 pb-1 border-b border-slate-700/50">
      <span class="text-[10px] text-slate-500 font-mono" x-text="selectedEndpoint"></span>
      <button @click="exportCmdJSON()"
              class="text-[10px] px-2 py-0.5 rounded bg-slate-800 text-slate-400 hover:text-slate-200 border border-slate-700 transition-colors">
        ↓ JSON
      </button>
    </div>
    <div x-show="cmdError" class="text-xs text-red-400 font-mono px-3 py-2" x-text="cmdError"></div>
    <div x-show="!cmdOutput && !cmdError" class="text-xs text-slate-500 px-3 py-4 text-center">
      Select a command and press Run
    </div>
    <pre x-show="cmdOutput !== null"
         class="font-mono text-xs text-slate-800 dark:text-green-400 overflow-x-auto whitespace-pre-wrap leading-relaxed p-3 max-h-[60vh] overflow-y-auto"
         x-text="cmdOutputStr"></pre>
  </div>

</div>
