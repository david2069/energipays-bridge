<!-- Dashboard tab -->
<div x-show="$store.app.activeTab === 'dashboard'" x-data="dashboardTab()">

  <!-- Hot Water card -->
  <div class="card mb-4">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-2">
        <svg class="w-5 h-5 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <span class="font-semibold text-slate-100">Hot Water</span>
      </div>
      <!-- Heating status badge -->
      <span class="text-xs px-2 py-0.5 rounded-full font-medium"
            :class="$store.app.points.heaterStatus == 1 ? 'bg-brand/20 text-brand' : 'bg-slate-700 text-slate-400'"
            x-text="$store.app.points.heaterStatus == 1 ? 'Heating' : 'Idle'"></span>
    </div>

    <!-- Primary temperature (avg) -->
    <div class="text-4xl font-bold text-slate-100 mb-1"
         x-text="fmt($store.app.points.waterTemperatureAvg, '°C', 1)"></div>
    <div class="text-xs text-slate-500 mb-3">Average temperature</div>

    <!-- T1 / T2 / T3 sensors -->
    <div class="grid grid-cols-3 gap-2 mb-4">
      <template x-for="[label, key, pos] in [['T1 Bottom','waterTemperature1','Hottest'],['T2 Middle','waterTemperature2',''],['T3 Top','waterTemperature3','']]">
        <div class="bg-slate-800 rounded-lg p-2 text-center">
          <div class="text-xs text-slate-500" x-text="label"></div>
          <div class="text-lg font-semibold text-slate-100 mt-0.5"
               x-text="fmt($store.app.points[key], '°C', 1)"></div>
        </div>
      </template>
    </div>

    <!-- T° setting -->
    <div class="flex justify-between text-sm text-slate-400 border-t border-slate-700 pt-3">
      <span>Target temperature</span>
      <span class="text-slate-200" x-text="fmt($store.app.points.temperatureLimit, '°C', 0)"></span>
    </div>

    <!-- Boost controls -->
    <div class="mt-4 pt-3 border-t border-slate-700">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-slate-300">Boost</span>
        <span class="text-xs px-2 py-0.5 rounded-full"
              :class="$store.app.points.boostStatus ? 'bg-brand/20 text-brand' : 'bg-slate-700 text-slate-500'"
              x-text="$store.app.points.boostStatus ? 'Active' : 'Inactive'"></span>
      </div>
      <div class="flex gap-2" x-show="!$store.app.safeMode">
        <template x-for="[period, label] in [[1,'1h'],[2,'2h'],[3,'3h']]">
          <button @click="sendBoost(period)"
                  :disabled="boosting"
                  class="flex-1 py-2 rounded-lg text-sm font-medium bg-slate-700 hover:bg-brand/30 hover:text-brand disabled:opacity-50 transition-colors"
                  x-text="label"></button>
        </template>
      </div>
      <div x-show="$store.app.safeMode" class="text-xs text-amber-400 text-center py-1">
        Safe Mode — enable writes in Settings to send commands
      </div>
    </div>
  </div>

  <!-- Grid card -->
  <div class="card mb-4">
    <div class="flex items-center gap-2 mb-3">
      <svg class="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>
      <span class="font-semibold text-slate-100">Grid</span>
    </div>

    <!-- Live import -->
    <div class="flex items-end gap-1 mb-3">
      <span class="text-3xl font-bold"
            :class="($store.app.points.phasePower || 0) < 0 ? 'text-green-400' : 'text-amber-400'"
            x-text="fmt(Math.abs($store.app.points.phasePower), 'kW', 2)"></span>
      <span class="text-sm text-slate-500 mb-1"
            x-text="($store.app.points.phasePower || 0) < 0 ? 'export' : 'import'"></span>
    </div>

    <!-- Period table -->
    <table class="w-full text-sm">
      <thead>
        <tr class="text-xs text-slate-500 border-b border-slate-700">
          <th class="text-left pb-1 font-normal">Period</th>
          <th class="text-right pb-1 font-normal">Export kWh</th>
          <th class="text-right pb-1 font-normal">Import kWh</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-800">
        <template x-for="[label, prefix] in [['Today','today'],['Yesterday','yesterday'],['7 days','last7days'],['14 days','last14days']]">
          <tr>
            <td class="py-1.5 text-slate-400" x-text="label"></td>
            <td class="py-1.5 text-right text-slate-200" x-text="fmt($store.app.points[prefix+'.EEct'], '', 1) || '—'"></td>
            <td class="py-1.5 text-right text-slate-200" x-text="fmt($store.app.points[prefix+'.IEct'], '', 1) || '—'"></td>
          </tr>
        </template>
      </tbody>
    </table>

    <!-- Phase voltages (only shown if multi-phase) -->
    <div x-show="($store.app.points.voltageB || 0) > 0" class="mt-3 pt-3 border-t border-slate-700 grid grid-cols-3 gap-2 text-xs text-center">
      <template x-for="[ph, key] in [['L1','voltageA'],['L2','voltageB'],['L3','voltageC']]">
        <div>
          <div class="text-slate-500" x-text="ph"></div>
          <div class="text-slate-200 font-medium" x-text="fmt($store.app.points[key], 'V', 0)"></div>
        </div>
      </template>
    </div>
  </div>

  <!-- Device status bar -->
  <div class="card">
    <div class="flex flex-wrap gap-x-6 gap-y-2 text-sm">
      <div>
        <span class="text-slate-500">Device</span>
        <span class="ml-2 text-slate-300 font-mono text-xs" x-text="($store.app.deviceId || '—').slice(0,8) + '…'"></span>
      </div>
      <div>
        <span class="text-slate-500">WiFi</span>
        <span class="ml-2 text-slate-300" x-text="($store.app.points.signalWiFi || '—') + (typeof $store.app.points.signalWiFi === 'number' ? ' dBm' : '')"></span>
      </div>
      <div>
        <span class="text-slate-500">Last poll</span>
        <span class="ml-2 text-slate-300" x-text="$store.app.lastPollLabel"></span>
      </div>
    </div>
  </div>

</div>
