<!-- Logs tab -->
<div x-show="$store.app.activeTab === 'logs'" x-data="logsTab()">

  <div class="flex flex-wrap items-center gap-2 mb-4">
    <h2 class="font-semibold text-slate-100 mr-auto">Logs</h2>

    <!-- Search -->
    <input
      type="search"
      x-model="search"
      placeholder="Search…"
      class="bg-slate-800 text-slate-300 text-xs rounded px-2 py-1 border border-slate-700 w-40 focus:outline-none focus:border-slate-500"
    />

    <!-- Level filter -->
    <select x-model="filter"
            class="bg-slate-800 text-slate-300 text-xs rounded px-2 py-1 border border-slate-700">
      <option value="">All levels</option>
      <option value="ERROR">ERROR</option>
      <option value="WARNING">WARNING</option>
      <option value="INFO">INFO</option>
      <option value="DEBUG">DEBUG</option>
    </select>

    <!-- Auto-refresh toggle -->
    <label class="flex items-center gap-1 text-xs text-slate-400 cursor-pointer select-none">
      <input type="checkbox" x-model="autoRefresh" class="accent-blue-500" />
      Auto
    </label>

    <!-- Count badge -->
    <span class="text-xs text-slate-500" x-text="filteredLogs.length + ' entries'"></span>

    <!-- Manual refresh -->
    <button @click="refresh()" :class="loading ? 'animate-spin' : ''"
            class="text-slate-400 hover:text-slate-200 text-sm leading-none">↺</button>
  </div>

  <!-- Log rows — horizontal + vertical scroll -->
  <div class="card p-0 overflow-hidden">
    <div class="max-h-[60vh] overflow-auto" id="log-scroll">
      <div class="min-w-max">
        <div x-show="pagedLogs.length === 0" class="text-slate-500 text-sm p-4 text-center min-w-0">No log entries.</div>
        <template x-for="(entry, i) in pagedLogs" :key="i">
          <div class="flex gap-3 px-3 py-1.5 font-mono text-xs border-b border-slate-800 hover:bg-slate-800/50 whitespace-nowrap"
               :class="{
                 'text-red-400':   entry.level === 'ERROR',
                 'text-amber-400': entry.level === 'WARNING',
                 'text-blue-400':  entry.level === 'DEBUG',
                 'text-slate-300': entry.level === 'INFO'
               }">
            <span class="shrink-0 text-slate-500 tabular-nums"
                  x-text="new Date(entry.ts * 1000).toLocaleTimeString()"></span>
            <span class="shrink-0 w-16 font-semibold" x-text="entry.level"></span>
            <span x-text="entry.msg"></span>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="flex items-center justify-between mt-2 px-1">
    <span class="text-xs text-slate-500" x-text="pageInfo"></span>
    <div class="flex items-center gap-1">
      <button @click="prevPage()" :disabled="page <= 1"
              class="px-2.5 py-1 rounded text-xs text-slate-400 hover:text-slate-200 hover:bg-slate-800 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
        ← Prev
      </button>
      <span class="text-xs text-slate-500 px-1" x-text="page + ' / ' + totalPages"></span>
      <button @click="nextPage()" :disabled="page >= totalPages"
              class="px-2.5 py-1 rounded text-xs text-slate-400 hover:text-slate-200 hover:bg-slate-800 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
        Next →
      </button>
    </div>
    <select x-model.number="pageSize" @change="resetPage()"
            class="text-xs bg-slate-800 border border-slate-700 text-slate-400 rounded px-1.5 py-0.5 focus:outline-none">
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="200">200</option>
    </select>
  </div>

</div>
