<!-- Logs tab -->
<div x-show="$store.app.activeTab === 'logs'" x-data="logsTab()">

  <div class="flex items-center justify-between mb-4">
    <h2 class="font-semibold text-slate-100">Logs</h2>
    <div class="flex gap-2">
      <select x-model="filter"
              class="bg-slate-800 text-slate-300 text-xs rounded px-2 py-1 border border-slate-700">
        <option value="">All levels</option>
        <option value="ERROR">ERROR</option>
        <option value="WARNING">WARNING</option>
        <option value="INFO">INFO</option>
        <option value="DEBUG">DEBUG</option>
      </select>
      <button @click="refresh()" class="text-xs text-slate-400 hover:text-slate-200">↺</button>
    </div>
  </div>

  <div class="card p-0 overflow-hidden">
    <div class="max-h-[60vh] overflow-y-auto">
      <div x-show="filteredLogs.length === 0" class="text-slate-500 text-sm p-4 text-center">No log entries.</div>
      <template x-for="(entry, i) in filteredLogs" :key="i">
        <div class="flex gap-3 px-3 py-1.5 font-mono text-xs border-b border-slate-800 hover:bg-slate-800/50"
             :class="entry.level === 'ERROR' ? 'text-red-400' : entry.level === 'WARNING' ? 'text-amber-400' : 'text-slate-400'">
          <span class="shrink-0 text-slate-600" x-text="new Date(entry.ts * 1000).toLocaleTimeString()"></span>
          <span class="shrink-0 w-14" x-text="entry.level"></span>
          <span class="truncate" x-text="entry.msg"></span>
        </div>
      </template>
    </div>
  </div>

</div>
