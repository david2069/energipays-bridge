<!-- Mobile bottom tab bar (md:hidden — sidebar handles navigation on iPad+) -->
<div class="md:hidden flex flex-col shrink-0">

  <!-- Slide-up "More" sheet (Raw, MQTT, Logs) -->
  <div x-show="$store.app.moreOpen"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-full"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-full"
       @click.outside="$store.app.moreOpen = false"
       class="border-t border-slate-700 bg-slate-800 px-4 py-3 grid grid-cols-3 gap-3">
    <template x-for="tab in $store.app.moreTabs" :key="tab.id">
      <button @click="$store.app.activeTab = tab.id; $store.app.moreOpen = false"
              :class="$store.app.activeTab === tab.id
                ? 'text-brand bg-brand/10 border border-brand/30'
                : 'text-slate-400 bg-slate-700/50'"
              class="flex flex-col items-center py-3 gap-1 text-xs rounded-xl transition-colors">
        <span x-html="tab.icon" class="w-5 h-5"></span>
        <span x-text="tab.label"></span>
      </button>
    </template>
  </div>

  <!-- Bottom nav bar: Home · Analytics · Rules · Settings · More -->
  <nav class="flex border-t border-slate-700 bg-slate-800">
    <template x-for="tab in $store.app.mainTabs" :key="tab.id">
      <button @click="$store.app.activeTab = tab.id; $store.app.moreOpen = false"
              :class="$store.app.activeTab === tab.id
                ? 'text-brand border-t-2 border-brand -mt-px'
                : 'text-slate-400'"
              class="flex-1 flex flex-col items-center py-2 gap-0.5 text-xs transition-colors">
        <span x-html="tab.icon" class="w-5 h-5"></span>
        <span x-text="tab.label"></span>
      </button>
    </template>
    <!-- More button -->
    <button @click="$store.app.moreOpen = !$store.app.moreOpen"
            :class="$store.app.moreOpen || ['raw','mqtt','logs'].includes($store.app.activeTab)
              ? 'text-brand border-t-2 border-brand -mt-px'
              : 'text-slate-400'"
            class="flex-1 flex flex-col items-center py-2 gap-0.5 text-xs transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
      <span>More</span>
    </button>
  </nav>
</div>
