<!-- Desktop sidebar nav -->
<nav class="w-16 flex flex-col items-center py-4 bg-slate-800 border-r border-slate-700 shrink-0">
  <!-- Energipays logo -->
  <div class="mb-5">
    <img src="/static/icons/devices/logo-small-clean.svg" alt="logo" class="w-8 h-8"
         onerror="this.src='/static/icons/icon-192.png'" />
  </div>

  <template x-for="tab in $store.app.tabs" :key="tab.id">
    <button
      @click="$store.app.activeTab = tab.id"
      :class="$store.app.activeTab === tab.id
        ? 'bg-brand/20 text-brand'
        : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700'"
      class="w-10 h-10 rounded-lg flex items-center justify-center mb-1 transition-colors"
      :title="tab.label">
      <!-- Use energipays.com sidebar icons where available, else fallback to inline SVG -->
      <template x-if="tab.id === 'dashboard'">
        <img src="/static/icons/devices/sidebar-devices.svg" class="w-5 h-5"
             :style="$store.app.activeTab === 'dashboard' ? 'filter:invert(59%) sepia(52%) saturate(500%) hue-rotate(95deg) brightness(95%) contrast(90%)' : 'filter:invert(60%) sepia(0%) saturate(0%) brightness(80%)'" alt=""/>
      </template>
      <template x-if="tab.id === 'analytics'">
        <img src="/static/icons/devices/sidebar-analytics.svg" class="w-5 h-5"
             :style="$store.app.activeTab === 'analytics' ? 'filter:invert(59%) sepia(52%) saturate(500%) hue-rotate(95deg) brightness(95%) contrast(90%)' : 'filter:invert(60%) sepia(0%) saturate(0%) brightness(80%)'" alt=""/>
      </template>
      <template x-if="tab.id === 'rules'">
        <img src="/static/icons/devices/sidebar-rules.svg" class="w-5 h-5"
             :style="$store.app.activeTab === 'rules' ? 'filter:invert(59%) sepia(52%) saturate(500%) hue-rotate(95deg) brightness(95%) contrast(90%)' : 'filter:invert(60%) sepia(0%) saturate(0%) brightness(80%)'" alt=""/>
      </template>
      <template x-if="tab.id !== 'dashboard' && tab.id !== 'analytics' && tab.id !== 'rules'">
        <span x-html="tab.icon" class="w-5 h-5"></span>
      </template>
    </button>
  </template>
</nav>
