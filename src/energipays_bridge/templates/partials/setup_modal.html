<!-- Setup wizard — shown on first run (needs_setup=true) or manually triggered -->
<div x-show="$store.app.setupModal" x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-data="setupWizard()"
     @open-setup-wizard.window="onReopen($event.detail)">

  <div class="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-lg flex flex-col max-h-[90vh]">

    <!-- Header -->
    <div class="flex items-center gap-3 px-6 pt-6 pb-4 border-b border-slate-800 shrink-0">
      <img src="static/icons/devices/logo-small-dark.svg" alt="" class="w-7 h-7 shrink-0"/>
      <div class="min-w-0">
        <div class="font-semibold text-slate-100" x-text="steps[step].title"></div>
        <div class="text-xs text-slate-500">
          <span x-text="'Step ' + (step+1) + ' of ' + steps.length"></span>
          <span class="ml-2 text-slate-600">v{{ app_version }}</span>
        </div>
      </div>
      <!-- Step dots -->
      <div class="ml-auto flex items-center gap-1.5">
        <template x-for="(s,i) in steps" :key="i">
          <span class="w-2 h-2 rounded-full transition-colors"
                :class="i === step ? 'bg-brand' : i < step ? 'bg-brand/40' : 'bg-slate-700'"></span>
        </template>
      </div>
    </div>

    <!-- Body (scrollable) -->
    <div class="overflow-y-auto flex-1 px-6 py-5 space-y-4">

      <!-- ── Step 0: Credentials ──────────────────────────────────── -->
      <template x-if="step === 0">
        <div class="space-y-4">
          <p class="text-sm text-slate-400">Enter your Energipays account credentials to connect the bridge to the cloud API.</p>

          <!-- Status banner -->
          <div x-show="credMsg" class="flex items-center gap-2 text-xs rounded-lg px-3 py-2"
               :class="credOk ? 'bg-green-900/30 border border-green-700/40 text-green-300' : 'bg-red-900/30 border border-red-700/40 text-red-300'">
            <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path x-show="credOk" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              <path x-show="!credOk" stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span x-text="credMsg"></span>
          </div>

          <div>
            <label class="block text-xs text-slate-400 mb-1">Email address</label>
            <input type="email" x-model="credEmail" placeholder="you@example.com"
                   :disabled="credBusy"
                   class="w-full bg-slate-800 text-slate-100 text-sm rounded-lg px-3 py-2 border border-slate-600 focus:outline-none focus:border-brand disabled:opacity-50"/>
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1">Password</label>
            <div class="relative">
              <input :type="showCredPw ? 'text' : 'password'" x-model="credPassword" placeholder="••••••••"
                     :disabled="credBusy"
                     class="w-full bg-slate-800 text-slate-100 text-sm rounded-lg px-3 py-2 pr-9 border border-slate-600 focus:outline-none focus:border-brand disabled:opacity-50"/>
              <button type="button" @click="showCredPw=!showCredPw"
                      class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path x-show="!showCredPw" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                  <path x-show="showCredPw" stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
          </div>
          <p class="text-xs text-slate-600 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            Stored AES-256 encrypted on this server only
          </p>

          <!-- Terminal -->
          <div x-data="setupTerminal()">
            <button type="button" @click="open=!open"
                    class="text-xs text-slate-500 hover:text-slate-300 underline underline-offset-2">
              <span x-text="open ? '▲ Hide terminal' : '▼ Open terminal'"></span>
            </button>
            <template x-if="open">
              <div class="mt-2 space-y-1">
                <p class="text-xs text-slate-500">Run CLI commands on the bridge server. Try <code class="bg-slate-800 px-1 rounded text-slate-300">energipays key</code> to extract the AES key.</p>
                <!-- Output -->
                <div class="bg-black rounded-lg p-3 font-mono text-xs text-green-300 min-h-[80px] max-h-48 overflow-y-auto whitespace-pre-wrap" x-ref="output" x-text="output || 'Ready.'"></div>
                <!-- Input row -->
                <div class="flex gap-2 items-center">
                  <span class="text-xs text-green-500 font-mono shrink-0">$</span>
                  <input type="text" x-model="cmd" x-ref="input"
                         @keydown.enter="run()"
                         @keydown.up.prevent="historyUp()"
                         @keydown.down.prevent="historyDown()"
                         placeholder="energipays key  |  energipays-bridge status  |  energipays --help"
                         class="flex-1 bg-slate-900 text-green-300 text-xs font-mono rounded px-2 py-1.5 border border-slate-700 focus:outline-none focus:border-green-700 placeholder-slate-700"/>
                  <button type="button" @click="run()" :disabled="busy"
                          class="px-3 py-1.5 rounded text-xs bg-slate-700 hover:bg-slate-600 text-slate-200 border border-slate-600 disabled:opacity-40">
                    <span x-show="busy">…</span><span x-show="!busy">Run</span>
                  </button>
                </div>
              </div>
            </template>
          </div>

          <!-- AES key tools -->
          <div x-data="keyTools()" @run-key-diag.window="open = true; runDiag()">
            <button type="button" @click="open=!open"
                    class="text-xs text-slate-500 hover:text-slate-300 underline underline-offset-2">
              <span x-text="open ? '▲ Hide AES key tools' : '▼ AES key tools (login says “AES key not set”?)'"></span>
            </button>
            <template x-if="open">
              <div class="mt-2 space-y-3">

                <!-- Diagnostics -->
                <div class="space-y-1.5">
                  <div class="flex items-center gap-2">
                    <button type="button" @click="runDiag()" :disabled="diagBusy"
                            class="px-3 py-1.5 rounded text-xs bg-slate-700 hover:bg-slate-600 text-slate-200 border border-slate-600 disabled:opacity-40">
                      <span x-show="diagBusy">Running…</span><span x-show="!diagBusy">Run key diagnostics</span>
                    </button>
                    <span class="text-xs text-slate-500">Probes each extraction step from inside this container.</span>
                  </div>
                  <template x-if="diagSteps.length">
                    <div class="bg-black/60 rounded-lg p-3 space-y-1 font-mono text-[11px] max-h-48 overflow-y-auto">
                      <template x-for="(s,i) in diagSteps" :key="i">
                        <div class="flex gap-2">
                          <span :class="s.ok ? 'text-green-400' : 'text-red-400'" x-text="s.ok ? '✓' : '✗'"></span>
                          <span class="text-slate-300 shrink-0" x-text="s.name"></span>
                          <span class="text-slate-500 break-all" x-text="'— ' + s.detail + ' (' + s.ms + 'ms)'"></span>
                        </div>
                      </template>
                    </div>
                  </template>
                  <div x-show="diagDone && diagKeyInstalled"
                       class="text-xs rounded-lg px-3 py-2 bg-green-900/30 border border-green-700/40 text-green-300">
                    Key extracted, installed and cached — try “Test connection” again.
                  </div>
                  <div x-show="diagDone && !diagKeyInstalled"
                       class="text-xs rounded-lg px-3 py-2 bg-amber-900/30 border border-amber-700/40 text-amber-300">
                    Auto-extraction failed at the step marked ✗. Use the browser fallback below.
                  </div>
                </div>

                <!-- Browser fallback -->
                <div class="space-y-1.5">
                  <div class="text-xs text-slate-400 font-medium">Fallback: extract the key with your own browser</div>
                  <ol class="text-xs text-slate-500 list-decimal list-inside space-y-0.5">
                    <li>Open <a href="https://energipays.com" target="_blank" class="text-brand underline">energipays.com</a> and log in</li>
                    <li>Press F12 → Console tab, paste the snippet, press Enter</li>
                    <li>Copy the 44-character key it prints into the field below</li>
                  </ol>
                  <div class="relative">
                    <pre class="bg-black rounded-lg p-3 pr-16 font-mono text-[10px] text-green-300 whitespace-pre-wrap break-all select-all" x-text="snippet"></pre>
                    <button type="button" @click="copySnippet()"
                            class="absolute top-2 right-2 px-2 py-1 rounded text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-200 border border-slate-600">
                      <span x-text="copied ? 'Copied ✓' : 'Copy'"></span>
                    </button>
                  </div>
                  <div class="flex gap-2 items-center">
                    <input type="text" x-model="manualKey" placeholder="Paste 44-char key, e.g. AbCd…xYz="
                           class="flex-1 bg-slate-800 text-slate-100 text-xs font-mono rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-brand placeholder-slate-600"/>
                    <button type="button" @click="applyKey()" :disabled="keyBusy || !manualKey.trim()"
                            class="px-3 py-1.5 rounded text-xs bg-brand hover:bg-brand/90 text-white disabled:opacity-40">
                      <span x-show="keyBusy">…</span><span x-show="!keyBusy">Apply key</span>
                    </button>
                  </div>
                  <div x-show="keyMsg" class="text-xs" :class="keyOk ? 'text-green-400' : 'text-red-400'" x-text="keyMsg"></div>
                </div>

              </div>
            </template>
          </div>

          <div class="flex gap-2">
            <button type="button" @click="testCreds()"
                    :disabled="credBusy || !credEmail || !credPassword"
                    class="flex-1 py-2 rounded-lg text-sm border border-slate-600 text-slate-300 hover:border-slate-400 transition-colors disabled:opacity-40">
              <span x-show="credBusy && !credOk">Testing…</span>
              <span x-show="!(credBusy && !credOk)">Test connection</span>
            </button>
            <button type="button" @click="saveCreds()"
                    :disabled="credBusy || !credEmail || !credPassword"
                    class="flex-1 py-2 rounded-lg text-sm font-semibold bg-brand hover:bg-brand/90 text-white transition-colors disabled:opacity-40">
              <span x-show="credBusy && credOk">Saving…</span>
              <span x-show="!(credBusy && credOk)">Save &amp; connect</span>
            </button>
          </div>
        </div>
      </template>

      <!-- ── Step 1: MQTT ─────────────────────────────────────────── -->
      <template x-if="step === 1">
        <div class="space-y-4">
          <p class="text-sm text-slate-400">
            MQTT Discovery publishes all device sensors and controls as Home Assistant entities automatically.
          </p>

          <!-- Feature card -->
          <div class="space-y-2">
            <div class="rounded-xl border p-4 transition-colors"
                 :class="wantMqtt ? 'border-brand/50 bg-brand/5' : 'border-slate-700 bg-slate-800/40'">
              <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" x-model="wantMqtt" class="mt-0.5 w-4 h-4 accent-brand shrink-0"/>
                <div>
                  <div class="text-sm font-medium text-slate-200">Enable MQTT Discovery</div>
                  <div class="text-xs text-slate-500 mt-0.5">Requires a running MQTT broker (e.g. Mosquitto).</div>
                </div>
              </label>
              <template x-if="wantMqtt">
                <div class="mt-3 pt-3 border-t border-slate-700 space-y-2">

                  <!-- Discovery banner -->
                  <div class="flex items-center gap-2">
                    <button type="button" @click="runDiscover()" :disabled="mqttDiscovering"
                            class="px-2.5 py-1 rounded text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-200 border border-slate-600 disabled:opacity-40 shrink-0">
                      <span x-show="mqttDiscovering">Searching…</span><span x-show="!mqttDiscovering">🔍 Find broker</span>
                    </button>
                    <span x-show="mqttDiscoverMsg" class="text-[10px]"
                          :class="mqttDiscoverOk ? 'text-green-400' : 'text-amber-400'"
                          x-text="mqttDiscoverMsg"></span>
                  </div>

                  <div class="grid grid-cols-2 gap-2">
                    <div>
                      <div class="text-[10px] text-slate-500 mb-1">Host</div>
                      <input type="text" x-model="mqttHost" placeholder="192.168.0.1"
                             class="w-full bg-slate-700 text-slate-100 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-brand font-mono"/>
                    </div>
                    <div>
                      <div class="text-[10px] text-slate-500 mb-1">Port</div>
                      <input type="number" x-model="mqttPort" placeholder="1883"
                             class="w-full bg-slate-700 text-slate-100 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-brand font-mono"/>
                    </div>
                    <div>
                      <div class="text-[10px] text-slate-500 mb-1">Username <span class="text-slate-600">(optional)</span></div>
                      <input type="text" x-model="mqttUsername"
                             class="w-full bg-slate-700 text-slate-100 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-brand font-mono"/>
                    </div>
                    <div>
                      <div class="text-[10px] text-slate-500 mb-1">Password <span class="text-slate-600">(optional)</span></div>
                      <input type="password" x-model="mqttPassword"
                             class="w-full bg-slate-700 text-slate-100 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-brand font-mono"/>
                    </div>
                  </div>
                  <label class="flex items-center gap-1.5 text-[10px] text-slate-500">
                    <input type="checkbox" x-model="mqttTls" class="w-3 h-3 accent-brand"/> Use TLS
                  </label>

                  <div class="flex items-center gap-2">
                    <button type="button" @click="testMqtt()" :disabled="mqttTesting || !mqttHost"
                            class="px-2.5 py-1 rounded text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-200 border border-slate-600 disabled:opacity-40">
                      <span x-show="mqttTesting">Testing…</span><span x-show="!mqttTesting">Test connection</span>
                    </button>
                    <span x-show="mqttTestMsg" class="text-[10px]"
                          :class="mqttTestOk ? 'text-green-400' : 'text-red-400'"
                          x-text="mqttTestMsg"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <div class="text-xs text-slate-500 bg-slate-800/60 rounded-lg px-3 py-2">
            You can always enable, disable, or reconfigure MQTT later in Settings → MQTT Discovery.
          </div>
        </div>
      </template>

      <!-- ── Step 2: Integrations ─────────────────────────────────── -->
      <template x-if="step === 2">
        <div class="space-y-3">
          <p class="text-sm text-slate-400">
            Connect external devices so their data appears in the power flow chart and Battery analytics tab.
          </p>

          <div class="rounded-xl border p-4 transition-colors"
               :class="wantBattery ? 'border-brand/50 bg-brand/5' : 'border-slate-700 bg-slate-800/40'">
            <label class="flex items-start gap-3 cursor-pointer">
              <input type="checkbox" x-model="wantBattery" class="mt-0.5 w-4 h-4 accent-brand shrink-0"/>
              <div>
                <div class="text-sm font-medium text-slate-200">🔋 Battery (e.g. FranklinWH)</div>
                <div class="text-xs text-slate-500 mt-0.5">Shows SoC ring, charge/discharge power, home load and operating mode in the dashboard power flow.</div>
              </div>
            </label>
          </div>

          <div class="rounded-xl border p-4 transition-colors"
               :class="wantSolar ? 'border-brand/50 bg-brand/5' : 'border-slate-700 bg-slate-800/40'">
            <label class="flex items-start gap-3 cursor-pointer">
              <input type="checkbox" x-model="wantSolar" class="mt-0.5 w-4 h-4 accent-brand shrink-0"/>
              <div>
                <div class="text-sm font-medium text-slate-200">☀️ Solar PV inverter</div>
                <div class="text-xs text-slate-500 mt-0.5">Adds an external solar node to the power flow chart. Supports REST, Modbus TCP, HA WebSocket, and MQTT.</div>
              </div>
            </label>
          </div>

          <div x-show="wantBattery || wantSolar"
               class="text-xs text-slate-500 bg-slate-800/60 rounded-lg px-3 py-2">
            After finishing setup, go to <strong class="text-slate-300">Settings → External Integrations</strong> to configure the connection details (host, protocol, register mappings).
          </div>

          <div class="text-xs text-slate-500 bg-slate-800/60 rounded-lg px-3 py-2">
            No integrations? No problem — you can add them any time from Settings.
          </div>
        </div>
      </template>

      <!-- ── Step 3: Home Assistant Notifications ─────────────────── -->
      <template x-if="step === 3">
        <div class="space-y-3">
          <p class="text-sm text-slate-400">
            Receive push notifications on your phone via Home Assistant when the device boosts, goes offline, or reaches a temperature threshold.
          </p>

          <div class="rounded-xl border p-4 transition-colors"
               :class="wantNotif ? 'border-brand/50 bg-brand/5' : 'border-slate-700 bg-slate-800/40'">
            <label class="flex items-start gap-3 cursor-pointer">
              <input type="checkbox" x-model="wantNotif" class="mt-0.5 w-4 h-4 accent-brand shrink-0"/>
              <div>
                <div class="text-sm font-medium text-slate-200">Enable push notifications</div>
                <div class="text-xs text-slate-500 mt-0.5">Sends via Home Assistant's mobile companion app notify service. Requires a Home Assistant instance with a long-lived token.</div>
              </div>
            </label>
          </div>

          <template x-if="wantNotif">
            <div class="space-y-2 text-xs text-slate-400 bg-slate-800/60 rounded-lg p-3">
              <div class="font-medium text-slate-300">What you'll configure in Settings:</div>
              <ul class="space-y-1 list-disc list-inside text-slate-500">
                <li>Home Assistant instance URL + long-lived token</li>
                <li>Companion device (mobile_app_your_phone)</li>
                <li>Which events trigger notifications (boost, offline, temperature…)</li>
              </ul>
            </div>
          </template>

          <div class="text-xs text-slate-500 bg-slate-800/60 rounded-lg px-3 py-2">
            Push notifications can be enabled or configured later in Settings → Push Notifications.
          </div>
        </div>
      </template>

      <!-- ── Step 4: Done ─────────────────────────────────────────── -->
      <template x-if="step === 4">
        <div class="space-y-4 text-center py-2">
          <div class="w-16 h-16 rounded-full bg-green-900/30 border border-green-700/40 flex items-center justify-center mx-auto">
            <svg class="w-8 h-8 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <div>
            <div class="text-lg font-semibold text-slate-100 mb-1">All set!</div>
            <div class="text-sm text-slate-400">Your bridge is configured and running.</div>
          </div>

          <!-- Summary -->
          <div class="text-left space-y-2 bg-slate-800/60 rounded-xl p-4">
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Configured</div>
            <div class="flex items-center gap-2 text-sm">
              <span class="w-5 h-5 rounded-full flex items-center justify-center text-xs"
                    :class="credSaved ? 'bg-green-900/50 text-green-400' : 'bg-slate-700 text-slate-500'">
                <span x-text="credSaved ? '✓' : '—'"></span>
              </span>
              <span :class="credSaved ? 'text-slate-200' : 'text-slate-500'">Energipays account</span>
            </div>
            <div class="flex items-center gap-2 text-sm">
              <span class="w-5 h-5 rounded-full flex items-center justify-center text-xs"
                    :class="wantMqtt ? 'bg-green-900/50 text-green-400' : 'bg-slate-700 text-slate-500'">
                <span x-text="wantMqtt ? '✓' : '—'"></span>
              </span>
              <span :class="wantMqtt ? 'text-slate-200' : 'text-slate-500'">MQTT Discovery</span>
              <span x-show="wantMqtt" class="text-xs text-slate-500" x-text="mqttHost ? '(' + mqttHost + ':' + mqttPort + ')' : ''"></span>
            </div>
            <div class="flex items-center gap-2 text-sm">
              <span class="w-5 h-5 rounded-full flex items-center justify-center text-xs"
                    :class="(wantBattery||wantSolar) ? 'bg-green-900/50 text-green-400' : 'bg-slate-700 text-slate-500'">
                <span x-text="(wantBattery||wantSolar) ? '✓' : '—'"></span>
              </span>
              <span :class="(wantBattery||wantSolar) ? 'text-slate-200' : 'text-slate-500'">
                External integrations
                <template x-if="wantBattery && wantSolar"><span> (Battery + Solar)</span></template>
                <template x-if="wantBattery && !wantSolar"><span> (Battery)</span></template>
                <template x-if="!wantBattery && wantSolar"><span> (Solar PV)</span></template>
              </span>
            </div>
            <div class="flex items-center gap-2 text-sm">
              <span class="w-5 h-5 rounded-full flex items-center justify-center text-xs"
                    :class="wantNotif ? 'bg-green-900/50 text-green-400' : 'bg-slate-700 text-slate-500'">
                <span x-text="wantNotif ? '✓' : '—'"></span>
              </span>
              <span :class="wantNotif ? 'text-slate-200' : 'text-slate-500'">Push notifications</span>
              <span x-show="wantNotif" class="text-xs text-slate-500">(finish in Settings)</span>
            </div>
          </div>

          <div x-show="wantBattery || wantSolar || wantNotif"
               class="text-xs text-slate-500">
            Head to <strong class="text-slate-300">Settings</strong> to finish configuring the optional modules you selected.
          </div>
        </div>
      </template>

    </div>

    <!-- Footer nav -->
    <div class="flex items-center gap-3 px-6 py-4 border-t border-slate-800 shrink-0">
      <button x-show="step > 0" type="button" @click="step--"
              class="px-4 py-2 rounded-lg text-sm text-slate-400 hover:text-slate-200 border border-slate-700 hover:border-slate-500 transition-colors">
        Back
      </button>
      <div class="flex-1"></div>
      <!-- Skip (only on optional steps 1-3 and not the last step) -->
      <button x-show="step > 0 && step < steps.length - 1" type="button"
              @click="step++"
              class="px-4 py-2 rounded-lg text-sm text-slate-500 hover:text-slate-300 transition-colors">
        Skip
      </button>
      <!-- Next / Finish -->
      <button type="button" @click="advance()"
              :disabled="step === 0 && !credSaved"
              class="px-5 py-2 rounded-lg text-sm font-semibold transition-colors disabled:opacity-40"
              :class="step === steps.length - 1 ? 'bg-green-600 hover:bg-green-500 text-white' : 'bg-brand hover:bg-brand/90 text-white'">
        <span x-text="step === steps.length - 1 ? 'Go to dashboard' : 'Next'"></span>
      </button>
    </div>

  </div>
</div>

<script>
function setupWizard() {
  return {
    step: 0,
    steps: [
      { title: 'Connect your account' },
      { title: 'MQTT Discovery' },
      { title: 'External integrations' },
      { title: 'Push notifications' },
      { title: 'Setup complete' },
    ],

    // Step 0 — credentials
    credEmail: '',
    credPassword: '',
    showCredPw: false,
    credBusy: false,
    credMsg: '',
    credOk: false,
    credSaved: false,

    // Step 1 — MQTT
    wantMqtt: false,
    mqttHost: '',
    mqttPort: '1883',
    mqttUsername: '',
    mqttPassword: '',
    mqttTls: false,
    mqttDiscovering: false,
    mqttDiscoverMsg: '',
    mqttDiscoverOk: false,
    mqttTesting: false,
    mqttTestMsg: '',
    mqttTestOk: false,

    // Step 2 — integrations
    wantBattery: false,
    wantSolar: false,

    // Step 3 — notifications
    wantNotif: false,

    runtime: '',   // 'ha_addon' | 'docker' | 'dev' — never mention env vars in ha_addon copy

    async init() {
      // Pre-fill if already connected
      const app = Alpine.store('app')
      if (app.userEmail) { this.credEmail = app.userEmail; this.credSaved = true }
      try {
        const r = await fetch('api/setup/status')
        if (r.ok) this.runtime = (await r.json()).runtime || ''
      } catch (_) {}
      // Check MQTT enabled / pre-fill from any existing config (DB override or env)
      try {
        const r = await fetch('api/mqtt/config')
        if (r.ok) {
          const d = await r.json()
          this.wantMqtt = d.enabled
          this.mqttHost = d.host || ''
          this.mqttPort = String(d.port || 1883)
          this.mqttUsername = d.username || ''
          this.mqttTls = !!d.tls
        }
      } catch (_) {}
      // Nothing configured yet — auto-suggest a broker so the field isn't just blank
      if (!this.mqttHost) this.runDiscover()
      // Check existing integrations
      try {
        const r = await fetch('/api/integrations')
        if (r.ok) {
          const list = await r.json()
          this.wantBattery = list.some(i => i.type === 'battery' && i.enabled)
          this.wantSolar = list.some(i => i.type === 'solar' && i.enabled)
        }
      } catch (_) {}
    },

    // Re-entry point for Settings' "Run setup wizard" button — the wizard's
    // x-data instance persists across x-show toggles, so without this it
    // would just re-show whatever step (usually "Setup complete") was left
    // over from the first run instead of a fresh pass.
    async onReopen(detail) {
      this.step = detail?.step ?? 0
      await this.init()
      Alpine.store('app').setupModal = true
    },

    async runDiscover() {
      this.mqttDiscovering = true; this.mqttDiscoverMsg = ''
      try {
        const r = await fetch('api/mqtt/discover')
        const d = await r.json()
        if (d.found) {
          this.mqttHost = d.host
          this.mqttPort = String(d.port)
          if (d.username) this.mqttUsername = d.username
          if (d.password) this.mqttPassword = d.password
          this.mqttTls = !!d.tls
          this.mqttDiscoverOk = true
          this.mqttDiscoverMsg = d.source === 'supervisor'
            ? 'Found HA broker via Supervisor (credentials included)'
            : `Found broker at ${d.host}:${d.port}`
        } else {
          this.mqttDiscoverOk = false
          this.mqttDiscoverMsg = d.error || 'No broker found — enter details manually'
        }
      } catch (e) {
        this.mqttDiscoverOk = false
        this.mqttDiscoverMsg = 'Discovery request failed'
      } finally { this.mqttDiscovering = false }
    },

    async testMqtt() {
      this.mqttTesting = true; this.mqttTestMsg = ''
      try {
        const r = await fetch('api/mqtt/test', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            host: this.mqttHost, port: parseInt(this.mqttPort) || 1883,
            username: this.mqttUsername, password: this.mqttPassword, tls: this.mqttTls,
          }),
        })
        const d = await r.json()
        this.mqttTestOk = !!d.ok
        this.mqttTestMsg = d.ok ? 'Connected successfully' : (d.error || 'Connection failed')
      } catch (e) {
        this.mqttTestOk = false
        this.mqttTestMsg = 'Network error'
      } finally { this.mqttTesting = false }
    },

    async saveMqttStep() {
      try {
        await fetch('api/mqtt/config', {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            enabled: this.wantMqtt, host: this.mqttHost, port: parseInt(this.mqttPort) || 1883,
            username: this.mqttUsername, password: this.mqttPassword || null, tls: this.mqttTls,
          }),
        })
      } catch (_) {
        Alpine.store('app').addToast('Could not save MQTT settings — try again from Settings', 'error')
      }
    },

    async testCreds() {
      this.credBusy = true; this.credMsg = ''; this.credOk = false
      try {
        const r = await fetch('/api/setup/test', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email: this.credEmail, password: this.credPassword}),
        })
        const d = await r.json()
        this.credOk = d.ok
        this.credMsg = d.ok ? `Connected as ${d.user?.name || this.credEmail}` : (d.error || 'Login failed')
        if (!d.ok) this.maybeKeyIssue(this.credMsg)
      } catch (_) { this.credMsg = 'Network error'; this.credOk = false }
      finally { this.credBusy = false }
    },

    // A key-related login failure auto-opens the AES key tools and runs diagnostics
    maybeKeyIssue(msg) {
      if (/AES key|auto-extract|ENERGIPAYS_KEY/i.test(msg || '')) {
        window.dispatchEvent(new CustomEvent('run-key-diag'))
      }
    },

    async saveCreds() {
      this.credBusy = true; this.credMsg = ''; this.credOk = false
      try {
        const r = await fetch('/api/setup/save', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email: this.credEmail, password: this.credPassword}),
        })
        const d = await r.json()
        this.credOk = d.ok
        if (d.ok) {
          this.credSaved = true
          this.credMsg = `Saved — connected as ${d.user?.name || this.credEmail}`
          Alpine.store('app').addToast('Account connected', 'success')
        } else {
          this.credMsg = d.error || 'Login failed'
          this.maybeKeyIssue(this.credMsg)
        }
      } catch (_) { this.credMsg = 'Network error'; this.credOk = false }
      finally { this.credBusy = false }
    },

    async advance() {
      if (this.step === 1) await this.saveMqttStep()
      if (this.step < this.steps.length - 1) {
        this.step++
      } else {
        // Done — close modal
        Alpine.store('app').setupModal = false
        Alpine.store('app').needsSetup = false
        Alpine.store('app').activeTab = 'dashboard'
        if (this.wantBattery || this.wantSolar || this.wantNotif) {
          setTimeout(() => {
            Alpine.store('app').addToast('Head to Settings to finish configuring optional modules', 'info')
          }, 500)
        }
      }
    },
  }
}

function keyTools() {
  return {
    open: false,
    diagBusy: false,
    diagDone: false,
    diagKeyInstalled: false,
    diagSteps: [],
    manualKey: '',
    keyBusy: false,
    keyMsg: '',
    keyOk: false,
    copied: false,
    // Paste-into-DevTools extractor. Runs same-origin on energipays.com, so it
    // reads the JS bundle the way the container can't when its network path fails.
    snippet: `fetch('/asset-manifest.json').then(r=>r.json()).then(async m=>{const fs=[...new Set(Object.values(m.files||{}).concat(m.entrypoints||[]))].filter(f=>typeof f==='string'&&f.endsWith('.js'));for(const f of fs){const t=await fetch(f).then(r=>r.text());const k=t.match(/Base64\\.parse\\(\\s*["']([A-Za-z0-9+\\/]{43}=)["']/);if(k){console.log('AES KEY: '+k[1]);return}}console.log('key not found in any chunk')})`,

    async runDiag() {
      if (this.diagBusy) return
      this.diagBusy = true; this.diagDone = false; this.diagSteps = []; this.diagKeyInstalled = false
      try {
        const r = await fetch('api/setup/key-diagnostics', {method: 'POST'})
        const d = await r.json()
        this.diagSteps = d.steps || []
        this.diagKeyInstalled = !!d.key_installed
        this.diagDone = true
      } catch (e) {
        this.diagSteps = [{name: 'Request', ok: false, detail: 'Network error: ' + e, ms: 0}]
        this.diagDone = true
      } finally { this.diagBusy = false }
    },

    async copySnippet() {
      try {
        await navigator.clipboard.writeText(this.snippet)
        this.copied = true
        setTimeout(() => this.copied = false, 1500)
      } catch (_) {}
    },

    async applyKey() {
      this.keyBusy = true; this.keyMsg = ''
      try {
        const r = await fetch('api/setup/set-key', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({key: this.manualKey.trim()}),
        })
        const d = await r.json()
        this.keyOk = !!d.ok
        this.keyMsg = d.ok ? 'Key applied and cached — try “Test connection” again.' : (d.error || 'Failed to apply key')
      } catch (e) { this.keyOk = false; this.keyMsg = 'Network error: ' + e }
      finally { this.keyBusy = false }
    },
  }
}

function setupTerminal() {
  return {
    open: false,
    cmd: '',
    output: '',
    busy: false,
    history: [],
    histIdx: -1,
    async run() {
      const c = this.cmd.trim()
      if (!c || this.busy) return
      this.history.unshift(c)
      this.histIdx = -1
      this.busy = true
      this.output = '$ ' + c + '\n…'
      try {
        const r = await fetch('api/setup/run-cli', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({cmd: c})
        })
        const d = await r.json()
        this.output = '$ ' + c + '\n' + (d.output || '(no output)')
      } catch(e) {
        this.output = '$ ' + c + '\nNetwork error: ' + e
      }
      this.busy = false
      this.$nextTick(() => {
        if (this.$refs.output) this.$refs.output.scrollTop = 9999
        if (this.$refs.input) this.$refs.input.focus()
      })
    },
    historyUp() {
      if (this.history.length === 0) return
      this.histIdx = Math.min(this.histIdx + 1, this.history.length - 1)
      this.cmd = this.history[this.histIdx]
    },
    historyDown() {
      if (this.histIdx <= 0) { this.histIdx = -1; this.cmd = ''; return }
      this.histIdx--
      this.cmd = this.history[this.histIdx]
    },
  }
}
</script>
