<!-- Offline / reconnecting banner — shown when bridge loses connection to Energipays -->
<div x-show="!$store.app.connected && $store.app._prevConnected !== null"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 -translate-y-2"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 -translate-y-2"
     x-cloak
     class="bg-amber-900/80 border-b border-amber-700/60 px-4 py-2 flex items-center gap-3 text-amber-200 text-xs">

  <!-- Spinner -->
  <svg class="w-3.5 h-3.5 animate-spin shrink-0" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
  </svg>

  <span class="font-medium">Bridge offline</span>
  <span class="text-amber-400/80">·</span>

  <!-- Last seen -->
  <span x-text="$store.app.lastPollTs
    ? 'Last data ' + (function(ts){ const s=Math.round(Date.now()/1000-ts); return s<60 ? s+'s ago' : Math.round(s/60)+'m ago' })($store.app.lastPollTs)
    : 'No data received yet'">
  </span>

  <span class="text-amber-400/80">·</span>
  <span class="text-amber-300/70">Retrying every 10s</span>
</div>
