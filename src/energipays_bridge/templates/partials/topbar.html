<!-- Topbar: status + device selector + user -->
<header class="flex items-center gap-3 px-4 py-2 bg-slate-800 border-b border-slate-700 shrink-0 min-w-0">

  <!-- Status dot + poll time -->
  <div class="flex items-center gap-1.5 shrink-0">
    <span class="w-2 h-2 rounded-full animate-pulse"
          :class="$store.app.connected ? 'bg-green-400' : 'bg-red-500'"></span>
    <span class="text-xs text-slate-400" x-text="$store.app.connected ? 'Live' : 'Offline'"></span>
    <span class="hidden sm:inline text-xs text-slate-500 ml-0.5"
          x-text="'· ' + $store.app.lastPollLabel"></span>
  </div>

  <!-- Device selector dropdown -->
  <div class="relative shrink-0" x-data="{open:false}" @click.outside="open=false">
    <button @click="open=!open"
            class="flex items-center gap-1.5 bg-slate-700/50 hover:bg-slate-700 border border-slate-600/40 rounded-md px-3 py-1.5 text-sm text-slate-200 transition-colors">
      <!-- plug icon -->
      <svg class="w-3.5 h-3.5 text-brand shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
      <span class="hidden sm:inline max-w-[140px] truncate" x-text="$store.app.deviceName || 'Device'"></span>
      <span class="sm:hidden text-xs text-slate-400" x-text="($store.app.deviceName||'Dev').slice(0,6)"></span>
      <!-- chevron -->
      <svg class="w-3 h-3 text-slate-500 transition-transform" :class="open && 'rotate-180'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>

    <!-- Dropdown -->
    <div x-show="open" x-cloak
         x-transition:enter="transition ease-out duration-100" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
         class="absolute top-full left-0 mt-1 bg-slate-800 border border-slate-700 rounded-lg shadow-xl z-50 min-w-[220px] overflow-hidden">
      <div class="px-3 py-2 border-b border-slate-700">
        <div class="text-xs text-slate-500 font-medium uppercase tracking-wide">Power Diverter</div>
      </div>
      <template x-for="dev in $store.app.devices" :key="dev.id">
        <button @click="$store.app.switchDevice(dev.id); open=false"
                class="w-full text-left px-3 py-2.5 hover:bg-slate-700/60 flex items-center gap-3 transition-colors">
          <span class="w-2 h-2 rounded-full shrink-0 transition-colors"
                :class="dev.id === $store.app.selectedDeviceId ? 'bg-brand' : 'bg-slate-600'"></span>
          <div class="min-w-0">
            <div class="text-sm text-slate-200 font-medium truncate" x-text="dev.name || dev.id"></div>
            <div class="text-xs text-slate-500 truncate" x-text="(dev.sub_type || dev.type || '') + (dev.address ? ' · ' + dev.address : '')"></div>
          </div>
          <svg x-show="dev.id === $store.app.selectedDeviceId" class="w-4 h-4 text-brand ml-auto shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </button>
      </template>
      <div x-show="!$store.app.devices.length" class="px-3 py-3 text-xs text-slate-500 text-center">No devices loaded</div>
    </div>
  </div>

  <!-- Live stats strip (configurable; persisted to localStorage) -->
  <div class="hidden sm:flex items-center gap-3 ml-2"
       x-data="{fmt(v,u,dp){ if(v==null||v===undefined||v==='') return '—'; const n=parseFloat(v); return isNaN(n)?'—':`${n.toFixed(dp)}${u}` }}">
    <!-- Avg Temp -->
    <span x-show="$store.app.navCfg?.temp" class="flex items-center gap-1 text-xs text-slate-400 cursor-default" title="Avg Water Temp">
      <img src="/static/icons/devices/hot-water-icon.png" class="w-4 h-4 object-contain" alt="temp"/>
      <span x-text="fmt($store.app.points.waterTemperatureAvg,'°C',1)"></span>
    </span>
    <!-- Grid kW -->
    <span x-show="$store.app.navCfg?.grid" class="flex items-center gap-1 text-xs cursor-default" title="Grid Power">
      <img src="/static/icons/devices/lightning-icon.svg" class="w-4 h-4 opacity-80" alt="grid"/>
      <span :class="($store.app.points.phasePower||0)<-0.05?'text-amber-400':($store.app.points.phasePower||0)>0.05?'text-green-400':'text-slate-400'"
            x-text="fmt(Math.abs($store.app.points.phasePower),'kW',2)"></span>
    </span>
    <!-- Solar kW -->
    <span x-show="$store.app.navCfg?.solar" class="flex items-center gap-1 text-xs text-slate-400 cursor-default" title="Solar Power">
      <img src="/static/icons/devices/solar-icon.png" class="w-4 h-4 object-contain" alt="solar"/>
      <span x-text="fmt($store.app.points.solarStreamA,'kW',2)"></span>
    </span>
    <!-- Heater kW -->
    <span x-show="$store.app.navCfg?.heater" class="flex items-center gap-1 text-xs text-slate-400 cursor-default" title="Heater Power">
      <img src="/static/icons/devices/fire-icon.png" class="w-4 h-4 object-contain opacity-90" alt="heater"/>
      <span x-text="fmt(Math.abs($store.app.points.offPeakStreamHeaterPower),'kW',2)"></span>
    </span>
    <!-- WiFi signal -->
    <span x-show="$store.app.navCfg?.wifi && typeof $store.app.points.signalWiFi === 'number'"
          class="flex items-center gap-1 text-xs text-slate-400 cursor-default"
          :title="'WiFi ' + ($store.app.points.signalWiFi ?? '?') + ' dBm'">
      <span class="flex items-end gap-px h-3">
        <span class="w-1 rounded-sm inline-block" style="height:4px"
              :class="($store.app.points.signalWiFi||-100)>=-85?'bg-green-400':'bg-slate-600'"></span>
        <span class="w-1 rounded-sm inline-block" style="height:6px"
              :class="($store.app.points.signalWiFi||-100)>=-70?'bg-green-400':'bg-slate-600'"></span>
        <span class="w-1 rounded-sm inline-block" style="height:9px"
              :class="($store.app.points.signalWiFi||-100)>=-60?'bg-green-400':'bg-slate-600'"></span>
        <span class="w-1 rounded-sm inline-block" style="height:12px"
              :class="($store.app.points.signalWiFi||-100)>=-50?'bg-green-400':'bg-slate-600'"></span>
      </span>
    </span>
    <!-- LoRa -->
    <span x-show="$store.app.navCfg?.lora && $store.app.points['dev.is_lora_enabled'] != null"
          class="flex items-center gap-1 text-xs cursor-default" title="LoRa"
          :class="$store.app.points['dev.is_lora_enabled'] == 1 ? 'text-green-400' : 'text-slate-500'">
      <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M5 12.5c0-4.142 3.134-7.5 7-7.5s7 3.358 7 7.5"/>
        <path d="M8 12.5c0-2.485 1.79-4.5 4-4.5s4 2.015 4 4.5"/>
        <circle cx="12" cy="12.5" r="1.5" fill="currentColor"/>
      </svg>
      <span x-text="$store.app.points['dev.is_lora_enabled'] == 1 ? 'LoRa' : 'LoRa off'"></span>
    </span>
  </div>

  <!-- Right side -->
  <div class="ml-auto flex items-center gap-2 min-w-0" x-data="{showMenu:false}" @click.outside="showMenu=false">
    <!-- User account pill -->
    <div x-show="$store.app.userEmail"
         class="flex items-center gap-2 bg-slate-700/60 rounded-full px-3 py-1 cursor-pointer hover:bg-slate-700 transition-colors shrink-0"
         @click="$store.app.activeTab = 'settings'"
         title="Go to Settings">
      <div class="w-5 h-5 rounded-full bg-brand/30 flex items-center justify-center shrink-0">
        <span class="text-xs font-semibold text-brand leading-none"
              x-text="($store.app.userName || $store.app.userEmail || '?')[0].toUpperCase()"></span>
      </div>
      <span class="text-xs text-slate-300 hidden md:block max-w-32 truncate"
            x-text="$store.app.userName || $store.app.userEmail"></span>
    </div>

    <!-- Dark/light mode toggle -->
    <button @click="$store.app.toggleDark()"
            class="shrink-0 text-slate-500 hover:text-slate-300 transition-colors"
            :title="$store.app.isDark ? 'Switch to light mode' : 'Switch to dark mode'">
      <!-- Moon (dark mode active) -->
      <svg x-show="$store.app.isDark" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <!-- Sun (light mode active) -->
      <svg x-show="!$store.app.isDark" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <path stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>

    <!-- Topbar settings gear — fixed far right -->
    <div class="relative shrink-0">
      <button @click.stop="showMenu=!showMenu"
              class="text-slate-500 hover:text-slate-300 transition-colors" title="Topbar settings">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
      <div x-show="showMenu" x-cloak
           class="absolute right-0 top-full mt-2 bg-slate-800 border border-slate-700 rounded-lg shadow-xl z-50 min-w-[160px] py-1.5">
        <div class="px-3 py-1 text-[10px] text-slate-500 uppercase tracking-wider font-semibold">Show in topbar</div>
        <template x-for="[key, label] in [['temp','🌡 Avg Temp'],['grid','⚡ Grid kW'],['solar','☀ Solar kW'],['heater','🔥 Heater kW'],['wifi','📶 WiFi'],['lora','〜 LoRa']]" :key="key">
          <label class="flex items-center gap-2 px-3 py-1.5 hover:bg-slate-700/60 cursor-pointer">
            <input type="checkbox" :checked="$store.app.navCfg[key]" @change="$store.app.setNavCfg(key, $event.target.checked)"
                   class="w-3.5 h-3.5 accent-brand"/>
            <span class="text-xs text-slate-300" x-text="label"></span>
          </label>
        </template>
      </div>
    </div>
  </div>

</header>
